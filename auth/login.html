<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-800">
    <header class="px-10 sm:px-20 md:px-30 border-b-2 border-sky-400 relative z-50 bg-zinc-800 flex justify-between h-12 sm:h-14 md:h-15">
        <section class="flex gap-2 items-center">
            <img class="w-5 h-5" src="/assets/icon/logomoviegate.png" alt="moviegate logo">
            <h1 class="font-semibold text-sky-400">MOVIEGATE</h1>
        </section>
        <nav class="hidden sm:flex h-full items-center flex">
            <ul class="font-semibold text-white flex flex-row gap-8">
            <li><a href="/index.html">ALL FILMS</a></li>
            <li><a class="watchlistBtn" >MY WATCHLIST</a></li>
            <li><a class="authBtn bg-sky-400 flex cursor-pointer justify-center w-20 rounded-full" href="/auth/login.html">LOGIN</a></li>
            </ul>
        </nav>

        <!-- BURGER BUTTON -->
        <button id="menuBtn" class="sm:hidden text-sky-400 text-2xl">
        ☰
        </button>

        <!-- mobile menu -->
        <nav id="mobileMenu" class="absolute top-full left-0 w-full bg-zinc-800 border-b-2 border-sky-400 px-4 pb-4 text-white font-semibold sm:hidden hidden">

        <ul class="flex flex-col gap-4 py-3 text-center">
            <li><a href="/index.html">ALL FILMS</a></li>
            <li><a class="watchlistBtn cursor-pointer" >MY WATCHLIST</a></li>
            <li class="flex justify-center"><a class="authBtn bg-sky-400 w-20 text-center rounded-full" href="/auth/login.html">LOGIN</a></li>
        </ul>

</nav>

    </header>
    
<div id="toastContainer" class="fixed top-50 left-130 gap-3 z-40"></div>

    <main class="relative z-0 h-[calc(100vh-3rem)] sm:h-[calc(100vh-3.5rem)] md:h-[calc(100vh-3.75rem)] flex justify-center flex-col items-center gap-8">
        <section class="flex justify-center gap-2 items-center">
            <img class="w-5 h-5" src="/assets/icon/logomoviegate.png" alt="moviegate logo">
            <h1 class="text-sky-400 font-semibold">MOVIEGATE</h1>
        </section>
        <p id="loginError" class="text-red-400 text-sm mt-2 hidden"></p>
        <form id="form" data-type="login" class="text-white flex gap-5 flex-col" action="" autocomplete="off">

            <div class="gap-1 flex flex-col">
            <div class="flex items-center border-b-2 gap-2 focus-within:border-sky-400">
                <label class="text-white" for="email">Email</label>
                <input class="px-2 py-1 focus:outline-none focus:ring-0" type="email" id="email" name="email" required>
            </div>
                <p id="emailError" class="text-red-500 text-xs hidden"></p>
            </div>
            
            <div class="flex flex-col gap-1">
            <div class="flex items-center focus-within:border-sky-400 border-b-2 gap-2">
                <label for="password">Password</label>
                <input class="px-2 py-1 focus:outline-none focus:ring-0" type="password" id="password" name="password" required>
            </div>
                <p id="passwordError" class="text-red-500 text-xs hidden"></p>
            </div>
            <button type="submit" href="" class="text-white font-semibold m-auto w-20 rounded-full bg-sky-400">LOGIN</button>
        </form> 
            <section class="text-sky-400 flex gap-8 items-center flex-col text-center font-semibold">
                <p>NEW USER? <a class="underline" href="/auth/signup.html">REGISTER HERE</a></p>
            </section>
    </main>
    <footer></footer>
<script src="/js/navbar.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
