<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moviegate</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-800">
    <header class="px-10 sm:px-20 md:px-30 border-b-2 border-sky-400 sticky top-0 z-50 bg-zinc-800 flex justify-between h-12 sm:h-14 md:h-15">
        <section class="flex gap-2 items-center">
            <img class="w-5 h-5" src="/assets/icon/logomoviegate.png" alt="moviegate logo">
            <h1 class="font-semibold text-sky-400">MOVIEGATE</h1>
        </section>
        <nav class="hidden sm:flex h-full items-center flex">
            <ul class="font-semibold text-white flex flex-row gap-8">
            <li><a href="/index.html">ALL FILMS</a></li>
            <li><a class="watchlistBtn" >MY WATCHLIST</a></li>
            <li><a class="authBtn bg-sky-400 flex cursor-pointer justify-center w-20 rounded-full" href="/auth/login.html">LOGIN</a></li>
            </ul>
        </nav>

        <!-- BURGER BUTTON -->
        <button id="menuBtn" class="sm:hidden text-sky-400 text-2xl">
        ☰
        </button>

        <!-- mobile menu -->
         <nav id="mobileMenu" class="hidden flex justify-center bg-zinc-800 absolute top-12 left-0 w-full border-b-2 rounded-b-3xl border-sky-400 px-4 pb-4 text-white font-semibold sm:hidden ">
            <ul class="flex text-center flex-col gap-4 py-3 text-white">
                <li><a href="/index.html">ALL FILMS</a></li>
                <li><a class="watchlistBtn cursor-pointer" >MY WATCHLIST</li>
                <li class="flex justify-center w-30"><a class="authBtn bg-sky-400 cursor-pointer justify-center w-20 rounded-full" href="/auth/login.html">LOGIN</a></li>
            </ul>
         </nav>


    </header>

<div id="toastContainer" class="fixed top-50 left-130 gap-3 z-40 text-white font-semibold" ></div>

    <main class="px-10 sm:px-20 md:px-30 py-10 z-10">
        <h1 class="font-semibold text-3xl text-white">All Films (100)</h1>
        <section class="font-semibold flex flex-row gap-3 text-white mt-6 text-xs">
            <select name="genre" class="border-1 px-2 py-1 rounded-full w-25 bg-zinc-800 text-center" id="genre">
                <option value="" disabled selected>GENRE</option>
            </select>
            <select id="sortRating" class="border-1 rounded-full w-29 py-1 text-center bg-zinc-800 flex flex-row justify-between items-center px-2">
                <option value="">SORT BY IMDB<img class="w-4" src="/assets/icon/swap_vert.svg" alt="swap-icon"></option>
                <option value="desc">Rating High → Low</option>
                <option value="asc">Rating Low → High</option>
            </select>
        </section>

        <section id="movies" class="grid gap-8 mt-8">
        </section>

        <div id="pagination" class="flex gap-2 mt-10 justify-center"></div>
        <p id="paginationInfo" class="text-gray-300 absolute right-30"></p>
    </main>
<script src="/js/navbar.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
