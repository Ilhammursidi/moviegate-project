<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie detail</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-zinc-800">
    <header class="px-10 sm:px-20 md:px-30 border-b-2 border-sky-400 sticky top-0 bg-zinc-800 flex justify-between h-12 sm:h-14 md:h-15">
        <section class="flex gap-2 items-center">
            <img class="w-5 h-5" src="/assets/icon/logomoviegate.png" alt="moviegate logo">
            <h1 class="font-semibold text-sky-400">MOVIEGATE</h1>
        </section>
        <nav class="hidden sm:flex h-full items-center flex">
            <ul class="font-semibold text-white flex flex-row gap-8">
            <li><a href="/index.html">ALL FILMS</a></li>
            <li><a class="watchlistBtn" >MY WATCHLIST</a></li>
            <li><a class="authBtn bg-sky-400 flex cursor-pointer justify-center w-20 rounded-full" href="/auth/login.html">LOGIN</a></li>
            </ul>
        </nav>

        <!-- BURGER BUTTON -->
        <button id="menuBtn" class="sm:hidden text-sky-400 text-2xl">
        ☰
        </button>

        <!-- mobile menu -->
         <nav id="mobileMenu" class="hidden flex justify-center bg-zinc-800 absolute top-12 left-0 w-full border-b-2 rounded-b-3xl border-sky-400 px-4 pb-4 text-white font-semibold sm:hidden ">
            <ul class="flex text-center flex-col gap-4 py-3 text-white">
                <li><a href="/index.html">ALL FILMS</a></li>
                <li><a class="watchlistBtn" >MY WATCHLIST</li>
                <li class="flex justify-center w-30"><a class="authBtn bg-sky-400 cursor-pointer justify-center w-20 rounded-full" href="/auth/login.html">LOGIN</a></li>
            </ul>
         </nav>
    </header>

    <div id="toastContainer" class="fixed top-50 left-130 gap-3 z-50"></div>
    
    <main class="px-10 sm:px-20 md:px-30 py-20">
        <a class="text-white" href="/index.html">All films /</a>
        <section class="flex flex-col sm:flex-row md:flex-row py-5">
            <img class="rounded-md" id="poster">
            <section class="grid ml-5">
                <h1 class="text-2xl font-semibold text-white" id="title"></h1>
                <div id="genres"></div>
                <div class="flex flex-row gap-2 items-center" id="rating"></div>
                <p class="text-md text-gray-400" id="overview"></p>
                <p class="text-white" id="director"></p>
                <div id="cast" class="text-white">
                </div>
                <button id="addToWatchlist" class="justify-self-start rounded-full border border-2 border-white text-white font-semibold h-10 w-50">ADD TO WATCHLIST</button>
            </section>
        </section>

    </main>
    <script src="/js/navbar.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/details.js"></script>
</body>
</html>
